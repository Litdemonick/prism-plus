name: Build Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'sdk/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Validar estructura de extensiones
        run: npm run validate

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Compilar extensiones
        run: npm run build

      - name: Smoke tests
        run: npm test

      # NO se commitea dist/ ni index.json desde CI: el runner no tiene la llave
      # privada de firma, así que un build de CI generaría bundles SIN firmar y
      # PrismHub los rechazaría. El mantenedor compila y FIRMA en local
      # (npm run build con .keys/private.pem) y commitea dist/ + index.json ya
      # firmados. CI solo verifica que todo valide, tipe y compile.
